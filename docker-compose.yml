services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ndi_credentials
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ndi_credentials"]
      interval: 5s
      timeout: 5s
      retries: 10

  anvil:
    build:
      context: .
      dockerfile: docker/anvil.Dockerfile
    ports:
      - "8545:8545"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ndi_credentials
      JWT_SECRET: docker-dev-secret
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      UPLOAD_DIR: /app/apps/api/uploads
      CHAIN_RPC_URL: http://anvil:8545
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      CREDENTIAL_REGISTRY_ADDRESS: ""
      NDI_AUTH_BASE_URL: https://staging.bhutanndi.com
      NDI_API_BASE_URL: https://demo-client.bhutanndi.com
      NDI_CLIENT_ID: ""
      NDI_CLIENT_SECRET: ""
      NDI_DEFAULT_SCHEMA_NAME: https://dev-schema.ngotag.com/schemas/foundational-id
      NDI_WEBHOOK_ID: ndi-credential-chain
      NDI_WEBHOOK_URL: ""
      NDI_WEBHOOK_OAUTH_URL: ""
      NDI_WEBHOOK_CLIENT_ID: ndi-credential-chain
      NDI_WEBHOOK_CLIENT_SECRET: ""
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  uploads:
